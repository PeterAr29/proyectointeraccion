name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit & integration tests
        run: npm run test -- --run

      - name: Dependency audit (warning only)
        run: npm audit --audit-level=high
        continue-on-error: true

  # E2E se habilita a partir de F1.4 (login) y se hace obligatorio en F6.2.
